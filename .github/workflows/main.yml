name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialise TWA project
        run: |
          mkdir -p twa && cd twa
          bubblewrap init \
            --manifest=https://karoonline.in/manifest.json \
            --packageId=app.karoonline.twa \
            --skipPwaValidation \
            --directory=. || true

      - name: Build AAB
        working-directory: twa
        run: bubblewrap build --skipPwaValidation

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: karoonline-aab
          path: |
            twa/app-release-bundle.aab
            twa/app-release-signed.apk
            twa/android.keystore
