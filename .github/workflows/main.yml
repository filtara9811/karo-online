name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # पुरानी फाइलों की सफाई
          rm -rf twa-manifest.json twa-manifest

          # GitHub build में live website cache की वजह से manifest पुराना पढ़ सकता है,
          # इसलिए repo में saved public/manifest.json को local manifest के रूप में use कर रहे हैं।
          cp public/manifest.json twa-manifest.json
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('twa-manifest.json','utf8')); if(m.short_name!=='Karo') throw new Error('short_name missing'); if(!m.icons?.some(i=>i.sizes==='192x192')) throw new Error('192 icon missing'); if(!m.icons?.some(i=>i.sizes==='512x512')) throw new Error('512 icon missing'); console.log('Manifest OK:', m.short_name, m.icons.map(i=>i.sizes).join(','));"
          
          # लवेबल की नई सेटिंग्स के साथ फ्रेश शुरुआत
          # इसमें हमने 'Karo' को शॉर्ट नेम के तौर पर पक्का कर दिया है
          bubblewrap init --manifest=./twa-manifest.json --packageId="app.karoonline.twa" --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --yes
          
          # बिना किसी सवाल के ऐप फाइल बनाना
          yes | bubblewrap build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: karoonline-aab
          path: |
            *.aab
            *.keystore
