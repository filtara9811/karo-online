name: Build Android App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify tool versions
        run: |
          node --version
          bun --version
          java -version

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build web bundle
        run: bun run build
        env:
          NODE_ENV: production

      - name: Capacitor sync (android)
        run: bunx cap sync android

      - name: Apply native Android patches
        run: node scripts/patch-native-android.mjs
        env:
          APP_VERSION_CODE: ${{ github.run_number }}

      - name: Verify launcher icons present in every mipmap density
        run: |
          set -e
          MISSING=0
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            for f in ic_launcher.png ic_launcher_round.png; do
              P="android/app/src/main/res/mipmap-$d/$f"
              if [ ! -f "$P" ]; then
                echo "❌ MISSING: $P"
                MISSING=1
              else
                echo "✅ $P ($(stat -c%s "$P") bytes)"
              fi
            done
          done
          if [ $MISSING -ne 0 ]; then
            echo "Launcher icons missing — patch script did not produce them."
            exit 1
          fi


      - name: Ensure google-services.json is in place
        run: |
          set -e
          if [ ! -f android/app/google-services.json ]; then
            if [ -f google-services.json ]; then
              cp google-services.json android/app/google-services.json
              echo "✅ Copied google-services.json from project root → android/app/"
            else
              echo "❌ google-services.json missing at project root AND android/app/"
              exit 1
            fi
          fi
          PKG=$(grep -o '"package_name"[^"]*"[^"]*"' android/app/google-services.json | tail -1)
          echo "🔥 google-services.json present. $PKG"
          # Mirror for both buildTypes so processDebug/ReleaseGoogleServices always finds it.
          mkdir -p android/app/src/debug android/app/src/release
          cp android/app/google-services.json android/app/src/debug/google-services.json
          cp android/app/google-services.json android/app/src/release/google-services.json

      - name: Verify google-services plugin is applied
        run: |
          set -e
          grep -q "com.google.gms:google-services" android/build.gradle \
            && echo "✅ google-services classpath present in android/build.gradle" \
            || (echo "❌ google-services classpath missing"; exit 1)
          grep -q "com.google.gms.google-services" android/app/build.gradle \
            && echo "✅ google-services plugin applied in android/app/build.gradle" \
            || (echo "❌ google-services plugin not applied"; exit 1)

      - name: Decode and verify signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ]; then
            echo "❌ Play Store release signing secrets are missing. Required: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS."
            exit 1
          fi
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          keytool -list -keystore android/upload-keystore.jks -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          echo "✅ Release keystore decoded and alias verified."

      - name: Build signed release APK & Play Store AAB
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x gradlew
          set +e
          ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease --stacktrace --warning-mode all 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          set -e
          echo "::group::Last 200 lines of full Gradle log"
          tail -200 build.log
          echo "::endgroup::"
          if [ "$GRADLE_EXIT" -ne 0 ]; then
            echo "::group::Detected Gradle failure details"
            grep -n -B4 -A30 -E "FAILURE:|What went wrong|Execution failed|invalid source release|Keystore|keystore|AAPT|resource .* not found|error:" build.log | tail -300 || true
            echo "::endgroup::"
          fi
          exit "$GRADLE_EXIT"

      - name: List release files
        run: |
          echo "📂 Listing android/app/build/outputs/apk/release/"
          ls -lah android/app/build/outputs/apk/release/ || echo "⚠️ No APK output directory found"
          echo "📂 Listing android/app/build/outputs/bundle/release/"
          ls -lah android/app/build/outputs/bundle/release/ || echo "⚠️ No AAB output directory found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karo-online-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Play Store AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: karo-online-playstore-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Add one-click download links to build summary
        run: |
          {
            echo "## ✅ Karo Online Android build ready"
            echo ""
            echo "Download buttons are available in this workflow run's **Artifacts** section:"
            echo "- **karo-online-apk** → installable APK"
            echo "- **karo-online-playstore-aab** → Play Store upload AAB"
            echo ""
            echo "Open this run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: android/build.log
          if-no-files-found: warn
