name: Build Android App
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Copy Google Services
        run: |
          # यह फाइल को सही जगह पर 'फोर्स' करके कॉपी कर देगा
          cp android/app/google-services.json android/app/google-services.json || echo "Copy failed"
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
