name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        timeout-minutes: 35
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD }}
          BUBBLEWRAP_KEY_ALIAS: ${{ secrets.BUBBLEWRAP_KEY_ALIAS }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          # Keystore file GitHub Secret से decode करते हैं (base64 encoded).
          # Secret name: ANDROID_KEYSTORE_BASE64
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ ! -f android.keystore ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android.keystore
            echo "✅ Keystore decoded from secret ($(wc -c < android.keystore) bytes)"
          fi

          # Bubblewrap को JDK/Android SDK paths दे रहे हैं.
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<JSON
          {"jdkPath":"${JAVA_HOME_17_X64}","androidSdkPath":"${ANDROID_HOME}"}
          JSON

          export BUBBLEWRAP_KEYSTORE_PASSWORD="${BUBBLEWRAP_KEYSTORE_PASSWORD:-android}"
          export BUBBLEWRAP_KEY_PASSWORD="${BUBBLEWRAP_KEY_PASSWORD:-android}"

          if [ ! -f android.keystore ]; then
            echo "::error::android.keystore missing. GitHub repo Settings → Secrets → Actions में ANDROID_KEYSTORE_BASE64 add करें (अपनी .keystore/.jks file का base64)."
            exit 1
          fi

          DETECTED_KEY_ALIAS="$({ keytool -list -v -keystore android.keystore -storepass "$BUBBLEWRAP_KEYSTORE_PASSWORD" 2>/dev/null || true; } | awk '
            /^Alias name:/ { alias=$0; sub(/^Alias name: /, "", alias) }
            /Entry type: PrivateKeyEntry/ { print alias; exit }
          ')"
          export BUBBLEWRAP_KEY_ALIAS="${BUBBLEWRAP_KEY_ALIAS:-$DETECTED_KEY_ALIAS}"

          if [ -z "$BUBBLEWRAP_KEY_ALIAS" ]; then
            echo "::error::इस keystore में signing key नहीं मिली. ANDROID_KEYSTORE_BASE64 में वही original upload keystore डालें जिससे पहला AAB Play Console ने accept किया था."
            keytool -list -keystore android.keystore -storepass "$BUBBLEWRAP_KEYSTORE_PASSWORD" || true
            exit 1
          fi

          echo "✅ Using signing key alias: $BUBBLEWRAP_KEY_ALIAS"

          # Play Store app details fixed here — package name वही रहेगा,
          # लेकिन app name/icon/theme अब package/blue Chrome जैसा नहीं दिखेगा.
          cat > twa-manifest.json <<'JSON'
          {
            "packageId": "app.karoonline.twa",
            "host": "karoonline.in",
            "name": "Karo Online",
            "launcherName": "Karo Online",
            "display": "standalone",
            "displayOverride": ["standalone"],
            "themeColor": "#e8e0d0",
            "themeColorDark": "#0f0b14",
            "navigationColor": "#0f0b14",
            "navigationColorDark": "#0f0b14",
            "navigationDividerColor": "#0f0b14",
            "navigationDividerColorDark": "#0f0b14",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://karoonline.in/icon-512.png",
            "maskableIconUrl": "https://karoonline.in/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": { "path": "./android.keystore", "alias": "__KEY_ALIAS__" },
            "appVersionCode": 2,
            "appVersion": "1.0.1",
            "fallbackType": "customtabs",
            "features": {},
            "enableSiteSettingsShortcut": false,
            "orientation": "portrait",
            "fingerprints": [],
            "additionalTrustedOrigins": []
          }
          JSON

          sed -i "s/__KEY_ALIAS__/$BUBBLEWRAP_KEY_ALIAS/g" twa-manifest.json

          bubblewrap update --skipVersionUpgrade --manifest=twa-manifest.json
          timeout 25m bubblewrap build --manifest=twa-manifest.json

      - name: Collect Play Console Upload File
        run: |
          set -euo pipefail

          SIGNED_BUNDLE="app-release-bundle.aab"
          if [ ! -f "$SIGNED_BUNDLE" ]; then
            echo "::error::Signed Play Store bundle $SIGNED_BUNDLE नहीं मिला. कृपया Bubblewrap build logs देखें."
            exit 1
          fi

          jarsigner -verify -strict -verbose "$SIGNED_BUNDLE" >/tmp/aab-signature-check.log 2>&1 || {
            cat /tmp/aab-signature-check.log
            echo "::error::$SIGNED_BUNDLE signed नहीं है, इसलिए Play Console इसे reject करेगा."
            exit 1
          }

          mkdir -p build_output
          cp "$SIGNED_BUNDLE" "build_output/UPLOAD-THIS-Karo-Online-signed.aab"
          if [ -f app-release-signed.apk ]; then
            cp app-release-signed.apk build_output/Karo-Online-test-install-signed.apk
          fi
          cat > build_output/README-HINDI.txt <<'EOF'
          Play Console में सिर्फ यह file upload करें:

          UPLOAD-THIS-Karo-Online-signed.aab

          app-release.aab upload न करें — वह unsigned/intermediate file होती है और Play Console "All uploaded bundles must be signed" error दिखाता है.
          EOF

      - name: Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Karo-Online-Final-App
          path: build_output/
          if-no-files-found: error
