name: Build Native Capacitor Android AAB

on:
  workflow_dispatch:

jobs:
  build-native-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses >/dev/null

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create native Android project
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi

      - name: Decode Firebase config and upload keystore
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          BUBBLEWRAP_KEYSTORE_BASE64: ${{ secrets.BUBBLEWRAP_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BUBBLEWRAP_KEY_ALIAS: ${{ secrets.BUBBLEWRAP_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          decode_base64_secret() {
            local value="$1"
            local output="$2"
            local label="$3"

            if printf '%s' "$value" | base64 --decode > "$output" 2>/tmp/${label}-base64.err; then
              return 0
            fi

            if printf '%s' "$value" | tr -d '\r\n\t ' | base64 --decode > "$output" 2>/tmp/${label}-base64-stripped.err; then
              return 0
            fi

            rm -f "$output"
            echo "::error::${label} is present but could not be base64-decoded. Please recreate it from the original file with: base64 -w 0 <file>"
            exit 1
          }

          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret missing. Firebase Console से Android app app.karoonline.twa का google-services.json base64 करके add करें."
            exit 1
          fi
          ANDROID_DIR="$PWD/android"
          APP_DIR="$ANDROID_DIR/app"
          KEYSTORE_PATH="$ANDROID_DIR/upload-keystore.jks"
          KEY_PROPERTIES_PATH="$ANDROID_DIR/key.properties"
          GOOGLE_SERVICES_PATH="$APP_DIR/google-services.json"
          mkdir -p "$APP_DIR"

          decode_base64_secret "$GOOGLE_SERVICES_JSON_BASE64" "$RUNNER_TEMP/google-services.json" google-services-json
          install -m 600 "$RUNNER_TEMP/google-services.json" "$GOOGLE_SERVICES_PATH"
          if [ ! -s "$GOOGLE_SERVICES_PATH" ]; then
            echo "::error::google-services.json was not written correctly at android/app/google-services.json."
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const file = process.argv[1];
            const expected = "app.karoonline.twa";
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            const packages = (json.client || [])
              .map((client) => client?.client_info?.android_client_info?.package_name)
              .filter(Boolean);
            if (!packages.includes(expected)) {
              console.error(`::error::google-services.json package mismatch. Expected ${expected}, found: ${packages.join(", ") || "none"}. Download Firebase Android config for package ${expected}.`);
              process.exit(1);
            }
          ' "$GOOGLE_SERVICES_PATH"
          echo "✅ google-services.json ready at android/app/google-services.json"

          KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64:-}"
          KEYSTORE_SOURCE="ANDROID_KEYSTORE_BASE64"
          if [ -z "$KEYSTORE_BASE64" ] && [ -n "${BUBBLEWRAP_KEYSTORE_BASE64:-}" ]; then
            KEYSTORE_BASE64="$BUBBLEWRAP_KEYSTORE_BASE64"
            KEYSTORE_SOURCE="BUBBLEWRAP_KEYSTORE_BASE64"
          fi

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Keystore base64 secret missing. Add ANDROID_KEYSTORE_BASE64 (preferred) or BUBBLEWRAP_KEYSTORE_BASE64. It must be the base64 of your .jks/.keystore file."
            exit 1
          fi

          mkdir -p "$ANDROID_DIR"
          decode_base64_secret "$KEYSTORE_BASE64" "$RUNNER_TEMP/upload-keystore.jks" upload-keystore-jks
          install -m 600 "$RUNNER_TEMP/upload-keystore.jks" "$KEYSTORE_PATH"
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Decoded keystore is empty at android/upload-keystore.jks. Please re-upload the keystore base64 secret."
            exit 1
          fi
          echo "✅ upload keystore decoded from $KEYSTORE_SOURCE to android/upload-keystore.jks"

          ANDROID_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-${BUBBLEWRAP_KEYSTORE_PASSWORD:-}}"
          ANDROID_KEY_ALIAS="${ANDROID_KEY_ALIAS:-${BUBBLEWRAP_KEY_ALIAS:-}}"
          PROVIDED_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-${BUBBLEWRAP_KEY_PASSWORD:-}}"
          ANDROID_KEY_PASSWORD="${PROVIDED_KEY_PASSWORD:-${ANDROID_KEYSTORE_PASSWORD:-}}"

          if [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::error::Signing secrets required. Add ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_PASSWORD (or matching BUBBLEWRAP_* fallback names). If key password is same as store password, ANDROID_KEY_PASSWORD can be omitted."
            exit 1
          fi

          if ! KEYTOOL_LIST_OUTPUT="$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1)"; then
            echo "::error::Keystore file is present at android/upload-keystore.jks, but ANDROID_KEYSTORE_PASSWORD cannot open it. Please verify the store password belongs to this exact keystore."
            printf '%s\n' "$KEYTOOL_LIST_OUTPUT" | sed -E 's/(password|Password|passwd|storepass|keypass)[^[:space:]]*/[redacted]/g' || true
            exit 1
          fi

          AVAILABLE_PRIVATE_ALIASES="$(printf '%s\n' "$KEYTOOL_LIST_OUTPUT" | awk '
            BEGIN { alias="" }
            /^Alias name:/ { alias=$0; sub(/^Alias name:[ \t]*/, "", alias) }
            /^Entry type: PrivateKeyEntry/ && alias != "" { print alias; alias="" }
          ' | awk 'NF && !seen[$0]++')"
          ALIAS_COUNT="$(printf '%s\n' "$AVAILABLE_PRIVATE_ALIASES" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ -z "${ANDROID_KEY_ALIAS:-}" ]; then
            if [ "$ALIAS_COUNT" = "1" ]; then
              ANDROID_KEY_ALIAS="$AVAILABLE_PRIVATE_ALIASES"
              echo "✅ ANDROID_KEY_ALIAS was empty, auto-detected the only private key alias from upload-keystore.jks"
            else
              echo "::error::ANDROID_KEY_ALIAS is missing and the keystore does not contain exactly one private key alias. Add the correct ANDROID_KEY_ALIAS secret."
              echo "Available private key aliases:"
              printf '%s\n' "$AVAILABLE_PRIVATE_ALIASES"
              exit 1
            fi
          elif ! printf '%s\n' "$AVAILABLE_PRIVATE_ALIASES" | grep -Fxq "$ANDROID_KEY_ALIAS"; then
            if [ "$ALIAS_COUNT" = "1" ]; then
              echo "::warning::Configured ANDROID_KEY_ALIAS was not found in upload-keystore.jks; using the only private key alias found instead."
              ANDROID_KEY_ALIAS="$AVAILABLE_PRIVATE_ALIASES"
            else
              echo "::error::ANDROID_KEY_ALIAS was not found in android/upload-keystore.jks. Update ANDROID_KEY_ALIAS to one of the available private key aliases below."
              echo "Available private key aliases:"
              printf '%s\n' "$AVAILABLE_PRIVATE_ALIASES"
              exit 1
            fi
          fi

          if ! keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/tmp/keytool-alias-check.log 2>&1; then
            echo "::error::Keystore file is present at android/upload-keystore.jks, but alias verification failed. Check ANDROID_KEY_ALIAS matches this exact keystore."
            sed -E 's/(password|Password|passwd|storepass|keypass)[^[:space:]]*/[redacted]/g' /tmp/keytool-alias-check.log || true
            echo "Available private key aliases:"
            printf '%s\n' "$AVAILABLE_PRIVATE_ALIASES"
            exit 1
          fi

          test_key_password() {
            local candidate="$1"
            rm -f "$RUNNER_TEMP/keypass-test.csr"
            keytool -certreq \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -keypass "$candidate" \
              -file "$RUNNER_TEMP/keypass-test.csr" >/tmp/keytool-keypass-check.log 2>&1
          }

          if ! test_key_password "$ANDROID_KEY_PASSWORD"; then
            if [ -n "${PROVIDED_KEY_PASSWORD:-}" ] && [ "$PROVIDED_KEY_PASSWORD" != "$ANDROID_KEYSTORE_PASSWORD" ] && test_key_password "$ANDROID_KEYSTORE_PASSWORD"; then
              echo "::warning::ANDROID_KEY_PASSWORD did not unlock the private key, but ANDROID_KEYSTORE_PASSWORD did. Using store password as keyPassword for this build."
              ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            else
              echo "::error::Keystore and alias are correct, but the private key password is wrong. Update ANDROID_KEY_PASSWORD, or delete it if it is the same as ANDROID_KEYSTORE_PASSWORD."
              sed -E 's/(password|Password|passwd|storepass|keypass)[^[:space:]]*/[redacted]/g' /tmp/keytool-keypass-check.log || true
              exit 1
            fi
          fi

          cat > "$KEY_PROPERTIES_PATH" <<KEYEOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          KEYEOF
          chmod 600 "$KEY_PROPERTIES_PATH"

          echo "✅ keystore password, alias, and private key password verified"
          echo "✅ signing key.properties ready"

      - name: Compute auto-bumped version
        run: |
          CODE=$((GITHUB_RUN_NUMBER + 10))
          echo "APP_VERSION_CODE=$CODE" >> $GITHUB_ENV
          echo "APP_VERSION_NAME=1.0.$CODE" >> $GITHUB_ENV
          echo "📦 versionCode=$CODE versionName=1.0.$CODE"

      - name: Build web assets
        run: bun run build

      - name: Sync, patch, and verify native Android project
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            bunx cap add android
          fi
          bunx cap sync android
          bun run native:patch

          if [ ! -f android/app/build.gradle ]; then
            echo "::error::android/app/build.gradle was not generated. Capacitor Android sync failed before Gradle build."
            exit 1
          fi

          echo "==================== ANDROID SDK CONFIG ===================="
          grep -nE "compileSdk|compileSdkVersion|minSdk|targetSdk" android/app/build.gradle android/variables.gradle || true
          echo "============================================================"

          echo "==================== JAVA VERSION CONFIG ===================="
          grep -nE "JavaVersion\.VERSION_|JvmTarget\.JVM_|jvmTarget" \
            android/app/build.gradle \
            node_modules/@capacitor/android/capacitor/build.gradle \
            node_modules/@capacitor-community/bluetooth-le/android/build.gradle \
            node_modules/@capgo/capacitor-updater/android/build.gradle || true
          echo "============================================================="

          if ! grep -Eq "compileSdk[[:space:]]*(=| )[[:space:]]*35|compileSdkVersion[[:space:]]*(=| )[[:space:]]*35" android/app/build.gradle android/variables.gradle; then
            echo "::error::compileSdk 35 was not written to the generated Android project."
            exit 1
          fi

          if grep -RE "JavaVersion\.VERSION_21|JvmTarget\.JVM_21|jvmTarget[[:space:]]*(=| )[[:space:]]*['\"]21['\"]" \
            android node_modules/@capacitor/android/capacitor node_modules/@capacitor-community/bluetooth-le/android node_modules/@capgo/capacitor-updater/android; then
            echo "::error::Java 21 settings are still present after native patch. The JDK 17 runner would fail with invalid source release: 21."
            exit 1
          fi


      - name: Build signed APK and AAB
        working-directory: android
        run: |
          set +e
          set -o pipefail
          mkdir -p ../build_output
          ./gradlew --no-daemon assembleRelease bundleRelease --stacktrace --warning-mode all --info 2>&1 | tee ../build_output/gradle-build.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "==================== EXACT GRADLE ERROR LINES ===================="
            grep -nE "FAILURE:|\* What went wrong:|Execution failed|Caused by:|> Task .* FAILED|A failure occurred|Compilation failed|Manifest merger failed|Android resource linking failed|Duplicate class|Could not|Keystore|google-services|Firebase|error:|Exception|BUILD FAILED" ../build_output/gradle-build.log | tail -n 120 || true
            echo "=================================================================="
            exit "$STATUS"
          fi

      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Karo-Online-Gradle-Failure-Logs
          path: build_output/gradle-build.log
          if-no-files-found: ignore

      - name: Verify and collect AAB
        run: |
          set -euo pipefail
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$AAB" ]; then
            echo "::error::Signed AAB not found at $AAB"
            exit 1
          fi
          if [ ! -f "$APK" ]; then
            echo "::error::Signed APK not found at $APK"
            exit 1
          fi
          mkdir -p build_output
          cp "$AAB" build_output/UPLOAD-THIS-Karo-Online-Native.aab
          cp "$APK" build_output/TEST-INSTALL-Karo-Online-Native.apk
          cat > build_output/README-HINDI.txt <<'HINDIEOF'
          यह Native Capacitor Android build है, Bubblewrap/TWA नहीं।

          Play Console में upload करने वाली file:
          UPLOAD-THIS-Karo-Online-Native.aab

          Phone पर direct test install करने वाली file:
          TEST-INSTALL-Karo-Online-Native.apk

          Test install के लिए पहले Play Console Internal Testing / Internal App Sharing use करें।
          HINDIEOF

      - name: Upload final native app
        uses: actions/upload-artifact@v4
        with:
          name: Karo-Online-Native-Android-AAB
          path: build_output/
          if-no-files-found: error
