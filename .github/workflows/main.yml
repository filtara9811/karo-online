name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # मशीन को किसी भी सवाल पर रुकने न देने के लिए 'yes' का इस्तेमाल
          yes | bubblewrap doctor
          
          # लवेबल के फिक्स किए हुए manifest के साथ ऐप सेटअप
          yes | bubblewrap init --manifest=https://karoonline.in/manifest.json --packageId="app.karoonline.twa" --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --yes
          
          # फाइनल ऐप फाइल बनाना
          yes | bubblewrap build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: karoonline-aab
          path: |
            *.aab
            *.keystore
