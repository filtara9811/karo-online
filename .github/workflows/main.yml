name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          yes | bubblewrap doctor
          
          yes | bubblewrap init --manifest=https://karoonline.in/manifest.json --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --packageId="app.karoonline.twa" --yes
          
          yes | bubblewrap build

      - name: Collect build outputs
        run: |
          mkdir -p artifacts
          find . -type f \( -name "*.aab" -o -name "*.keystore" \) -not -path "./node_modules/*" -print
          find . -type f -name "*.aab" -not -path "./node_modules/*" -exec cp {} artifacts/ \;
          find . -type f -name "*.keystore" -not -path "./node_modules/*" -exec cp {} artifacts/ \;
          test -n "$(ls -A artifacts/*.aab 2>/dev/null)"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: karoonline-aab
          path: artifacts/
          if-no-files-found: error
