name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # पुरानी टूटी-फूटी सेटिंग्स को साफ करना
          rm -rf twa-manifest.json
          
          # फ्रेश तरीके से ऐप की जानकारी भरना
          bubblewrap init --manifest=https://karoonline.in/manifest.json --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --yes
          
          # ऐप फाइल बनाना
          bubblewrap build --yes

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: karoonline-aab
          path: |
            *.aab
            *.keystore
