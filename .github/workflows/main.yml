name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # मशीन को पहले से ही 'Yes' बोलने के लिए यह जरूरी है
          yes | bubblewrap init --manifest=https://karoonline.in/manifest.json
          yes | bubblewrap build
        # ऊपर वाली लाइन में 'yes |' जोड़ा गया है ताकि मशीन अटके नहीं

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: karoonline-aab
          path: |
            *.aab
            *.keystore
