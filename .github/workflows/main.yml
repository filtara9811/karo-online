name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # पुरानी फाइलों को हटाकर फ्रेश शुरुआत
          rm -rf twa-manifest.json
          
          # लवेबल के नए फिक्स के साथ इनिशियलाइज़ करना
          bubblewrap init --manifest=https://karoonline.in/manifest.json --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --yes
          
          # ऐप की फाइनल फाइल बनाना
          yes | bubblewrap build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: karoonline-aab
          path: |
            *.aab
            *.keystore
