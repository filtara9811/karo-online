name: Build Karo Online AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build AAB
        run: |
          # Android SDK के लिए ऑटो-रिप्लाई
          yes | bubblewrap doctor
          
          # पब्लिश होने के बाद अब यह मेनिफेस्ट बिना किसी एरर के डाउनलोड होगा
          yes | bubblewrap init --manifest=https://karoonline.in/manifest.json --name="Karo Online" --shortName="Karo" --themeColor="#000080" --backgroundColor="#FFFFFF" --host="karoonline.in" --startUrl="/" --packageId="app.karoonline.twa" --yes
          
          yes | bubblewrap build

      - name: Collect All Files
        run: |
          # यह कमांड पूरे प्रोजेक्ट की तलाशी लेकर फाइलें एक जगह लाएगा
          mkdir -p build_output
          find . -name "*.aab" -exec cp {} build_output/ \;
          find . -name "*.keystore" -exec cp {} build_output/ \;
          find . -name "*.jks" -exec cp {} build_output/ \;

      - name: Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Karo-Online-Final-App
          path: build_output/
          if-no-files-found: error
