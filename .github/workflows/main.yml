name: Build Android App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build web bundle
        run: bun run build
        env:
          NODE_ENV: production

      - name: Capacitor sync (android)
        run: bunx cap sync android

      - name: Apply native Android patches
        run: node scripts/patch-native-android.mjs
        env:
          APP_VERSION_CODE: ${{ github.run_number }}

      - name: Ensure google-services.json is in place
        run: |
          set -e
          if [ ! -f android/app/google-services.json ]; then
            if [ -f google-services.json ]; then
              cp google-services.json android/app/google-services.json
              echo "✅ Copied google-services.json from project root → android/app/"
            else
              echo "❌ google-services.json missing at project root AND android/app/"
              exit 1
            fi
          fi
          PKG=$(grep -o '"package_name"[^"]*"[^"]*"' android/app/google-services.json | tail -1)
          echo "🔥 google-services.json present. $PKG"
          # Mirror for both buildTypes so processDebug/ReleaseGoogleServices always finds it.
          mkdir -p android/app/src/debug android/app/src/release
          cp android/app/google-services.json android/app/src/debug/google-services.json
          cp android/app/google-services.json android/app/src/release/google-services.json

      - name: Verify google-services plugin is applied
        run: |
          set -e
          grep -q "com.google.gms:google-services" android/build.gradle \
            && echo "✅ google-services classpath present in android/build.gradle" \
            || (echo "❌ google-services classpath missing"; exit 1)
          grep -q "com.google.gms.google-services" android/app/build.gradle \
            && echo "✅ google-services plugin applied in android/app/build.gradle" \
            || (echo "❌ google-services plugin not applied"; exit 1)

      - name: Decode signing keystore (optional)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build release APK & AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: karo-online-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
