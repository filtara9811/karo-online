name: Build Android App
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Copy Google Services
        run: |
          # यह कमांड फाइल को Debug और Release दोनों फोल्डर्स में डाल देगी ताकि कोई गलती न हो
          mkdir -p android/app/src/debug
          mkdir -p android/app/src/release
          cp android/app/google-services.json android/app/src/debug/
          cp android/app/google-services.json android/app/src/release/
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
