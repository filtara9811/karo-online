name: Build Android App
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Find and Copy Google Services File
        run: |
          # यह कमांड पूरे प्रोजेक्ट में फाइल को ढूँढेगी और उसे सही जगह कॉपी कर देगी
          FILE_PATH=$(find . -name "google-services.json" | head -n 1)
          if [ -f "$FILE_PATH" ]; then
            echo "File found at: $FILE_PATH"
            cp "$FILE_PATH" android/app/google-services.json
          else
            echo "File not found anywhere!"
            exit 1
          fi
      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleRelease
