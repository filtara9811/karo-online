name: Verify Keystore Secrets (Quick Check)

# इसको run करें जब आप password / alias / keystore secret update करें।
# पूरा build नहीं चलाएगा — सिर्फ 20-30 sec में बता देगा password सही है या नहीं।

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode keystore & test password
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          BUBBLEWRAP_KEYSTORE_BASE64: ${{ secrets.BUBBLEWRAP_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BUBBLEWRAP_KEY_ALIAS: ${{ secrets.BUBBLEWRAP_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          B64="${ANDROID_KEYSTORE_BASE64:-${BUBBLEWRAP_KEYSTORE_BASE64:-}}"
          STORE_PW="${ANDROID_KEYSTORE_PASSWORD:-${BUBBLEWRAP_KEYSTORE_PASSWORD:-}}"
          ALIAS="${ANDROID_KEY_ALIAS:-${BUBBLEWRAP_KEY_ALIAS:-}}"
          KEY_PW="${ANDROID_KEY_PASSWORD:-${BUBBLEWRAP_KEY_PASSWORD:-$STORE_PW}}"

          if [ -z "$B64" ]; then echo "::error::No keystore base64 secret set"; exit 1; fi
          if [ -z "$STORE_PW" ]; then echo "::error::No store password set"; exit 1; fi

          mkdir -p /tmp/ks
          printf '%s' "$B64" | base64 --decode > /tmp/ks/up.jks 2>/dev/null \
            || printf '%s' "$B64" | tr -d '\r\n\t ' | base64 --decode > /tmp/ks/up.jks
          SIZE=$(stat -c%s /tmp/ks/up.jks)
          echo "📦 Keystore decoded: $SIZE bytes"
          if [ "$SIZE" -lt 100 ]; then echo "::error::Keystore file too small — base64 secret corrupt"; exit 1; fi

          echo ""
          echo "=== TEST 1: Store password ==="
          if keytool -list -keystore /tmp/ks/up.jks -storepass "$STORE_PW" >/tmp/ks/list.txt 2>/tmp/ks/err.txt; then
            echo "✅ STORE PASSWORD सही है"
          else
            echo "❌ STORE PASSWORD गलत है"
            echo "   → GitHub Settings → Secrets → ANDROID_KEYSTORE_PASSWORD update करें"
            sed -E 's/(password|pass)[^[:space:]]*/[redacted]/gi' /tmp/ks/err.txt
            exit 1
          fi

          echo ""
          echo "=== Available aliases in keystore ==="
          awk '/^Alias name:/ {sub(/^Alias name:[ \t]*/,""); print "  • " $0}' /tmp/ks/list.txt

          echo ""
          echo "=== TEST 2: Alias + key password ==="
          if [ -z "$ALIAS" ]; then
            echo "⚠️  ANDROID_KEY_ALIAS empty — auto-detect होगा build में"
          else
            if keytool -list -keystore /tmp/ks/up.jks -storepass "$STORE_PW" -alias "$ALIAS" >/dev/null 2>&1; then
              echo "✅ ALIAS '$ALIAS' मिला"
            else
              echo "❌ ALIAS '$ALIAS' इस keystore में नहीं है (ऊपर list देखें)"
              exit 1
            fi
            if keytool -certreq -keystore /tmp/ks/up.jks -storepass "$STORE_PW" \
                 -alias "$ALIAS" -keypass "$KEY_PW" -file /tmp/ks/keypass-test.csr >/dev/null 2>/tmp/ks/kerr.txt; then
              echo "✅ KEY PASSWORD सही है"
            else
              if [ "$KEY_PW" != "$STORE_PW" ] && keytool -certreq -keystore /tmp/ks/up.jks -storepass "$STORE_PW" \
                   -alias "$ALIAS" -keypass "$STORE_PW" -file /tmp/ks/keypass-store-test.csr >/dev/null 2>/tmp/ks/kerr-store.txt; then
                echo "⚠️  ANDROID_KEY_PASSWORD गलत है, लेकिन store password private key को खोल रहा है"
                echo "   → ANDROID_KEY_PASSWORD secret delete करें या उसे ANDROID_KEYSTORE_PASSWORD जैसा करें"
              else
                echo "❌ KEY PASSWORD गलत है"
                echo "   → ANDROID_KEY_PASSWORD update करें (अगर store के बराबर है तो उसे delete कर दें)"
                sed -E 's/(password|pass)[^[:space:]]*/[redacted]/gi' /tmp/ks/kerr.txt
                exit 1
              fi
            fi
          fi

          echo ""
          echo "🎉 सब secrets सही हैं — अब Build Native Capacitor Android AAB workflow चला सकते हैं।"
